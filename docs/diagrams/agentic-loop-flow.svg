<svg width="680" viewBox="0 0 680 610" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Spec-to-PR agentic loop architecture</title>
<desc>A vertical flow: a manual trigger reads spec.md, an isolated git worktree is created, then an Actor-Critic loop of up to six iterations runs a Codex actor, enforces protected paths, runs pytest, then QA and security critics. On success it converges to a PR artifact; on hitting the cap it escalates. Skills feed the loop and Memory records every iteration.</desc>
<defs>
<style>
.c-gray rect{fill:#EEF1F4;stroke:#98A2B3;stroke-width:1.2}
.c-gray text{fill:#344054}
.c-blue rect{fill:#E6F1FB;stroke:#2E7CD6;stroke-width:1.2}
.c-blue text{fill:#0C447C}
.c-teal rect{fill:#DAF3EF;stroke:#0E9C8A;stroke-width:1.2}
.c-teal text{fill:#0B5A50}
.c-purple rect{fill:#EEE7FB;stroke:#8B5CF6;stroke-width:1.2}
.c-purple text{fill:#4C1D95}
.c-green rect{fill:#E4F5E9;stroke:#34A853;stroke-width:1.2}
.c-green text{fill:#145A32}
.c-amber rect{fill:#FBF0D5;stroke:#E0A100;stroke-width:1.2}
.c-amber text{fill:#7A4F01}
text{font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif}
</style>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#9CA3AF"/></marker>
</defs>

<rect x="0" y="0" width="680" height="610" fill="#FFFFFF"/>

<g class="c-gray"><rect x="20" y="11" width="12" height="12" rx="2"/></g>
<text x="38" y="22" font-size="11" fill="#6B7280">Automations (trigger)</text>
<g class="c-teal"><rect x="250" y="11" width="12" height="12" rx="2"/></g>
<text x="268" y="22" font-size="11" fill="#6B7280">Worktrees (isolate)</text>
<g class="c-blue"><rect x="470" y="11" width="12" height="12" rx="2"/></g>
<text x="488" y="22" font-size="11" fill="#6B7280">Sub-agents</text>
<g class="c-purple"><rect x="20" y="31" width="12" height="12" rx="2"/></g>
<text x="38" y="42" font-size="11" fill="#6B7280">Connectors</text>
<g class="c-green"><rect x="250" y="31" width="12" height="12" rx="2"/></g>
<text x="268" y="42" font-size="11" fill="#6B7280">Skills</text>
<g class="c-amber"><rect x="470" y="31" width="12" height="12" rx="2"/></g>
<text x="488" y="42" font-size="11" fill="#6B7280">Memory</text>

<g class="c-gray"><rect x="210" y="62" width="260" height="42" rx="8"/>
<text x="340" y="80" font-size="13" font-weight="500" text-anchor="middle">Trigger — manual</text>
<text x="340" y="95" font-size="11" text-anchor="middle" opacity="0.7">read spec.md · set caps · init memory</text></g>
<line x1="340" y1="104" x2="340" y2="116" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-teal"><rect x="210" y="118" width="260" height="42" rx="8"/>
<text x="340" y="136" font-size="13" font-weight="500" text-anchor="middle">Isolate</text>
<text x="340" y="151" font-size="11" text-anchor="middle" opacity="0.7">git worktree · fresh branch off main</text></g>
<line x1="340" y1="160" x2="340" y2="176" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<rect x="188" y="176" width="304" height="316" rx="12" fill="none" stroke="#C7CDD6" stroke-width="1.3" stroke-dasharray="5 4"/>
<text x="340" y="193" font-size="11" text-anchor="middle" fill="#6B7280">actor-critic loop · max 6 iters / 20 min</text>

<g class="c-blue"><rect x="210" y="200" width="260" height="42" rx="8"/>
<text x="340" y="218" font-size="13" font-weight="500" text-anchor="middle">Actor (maker)</text>
<text x="340" y="233" font-size="11" text-anchor="middle" opacity="0.7">codex exec --sandbox workspace-write</text></g>
<line x1="340" y1="242" x2="340" y2="250" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-teal"><rect x="210" y="252" width="260" height="42" rx="8"/>
<text x="340" y="270" font-size="13" font-weight="500" text-anchor="middle">Enforce protected paths</text>
<text x="340" y="285" font-size="11" text-anchor="middle" opacity="0.7">git diff · rollback tests/ &amp; §</text></g>
<line x1="340" y1="294" x2="340" y2="302" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-purple"><rect x="210" y="304" width="260" height="42" rx="8"/>
<text x="340" y="322" font-size="13" font-weight="500" text-anchor="middle">Tests</text>
<text x="340" y="337" font-size="11" text-anchor="middle" opacity="0.7">pytest — deterministic gate</text></g>
<line x1="340" y1="346" x2="340" y2="354" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-blue"><rect x="210" y="356" width="260" height="42" rx="8"/>
<text x="340" y="374" font-size="13" font-weight="500" text-anchor="middle">QA critic (checker)</text>
<text x="340" y="389" font-size="11" text-anchor="middle" opacity="0.7">codex exec --sandbox read-only</text></g>
<line x1="340" y1="398" x2="340" y2="406" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-blue"><rect x="210" y="408" width="260" height="42" rx="8"/>
<text x="340" y="426" font-size="13" font-weight="500" text-anchor="middle">Security critic (checker)</text>
<text x="340" y="441" font-size="11" text-anchor="middle" opacity="0.7">read-only vs constitution §1–§5</text></g>
<text x="340" y="476" font-size="11" text-anchor="middle" fill="#6B7280">any gate fails -> log to memory -> re-enter actor</text>

<path d="M 210 429 L 200 429 L 200 221 L 210 221" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-green"><rect x="14" y="300" width="150" height="86" rx="8"/>
<text x="89" y="322" font-size="13" font-weight="500" text-anchor="middle">skills/</text>
<text x="89" y="340" font-size="11" text-anchor="middle" opacity="0.7">constitution.md</text>
<text x="89" y="356" font-size="11" text-anchor="middle" opacity="0.7">prompts/*.txt</text>
<text x="89" y="372" font-size="11" text-anchor="middle" opacity="0.7">read-only to actor</text></g>
<line x1="164" y1="343" x2="186" y2="343" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>

<g class="c-amber"><rect x="516" y="200" width="152" height="250" rx="8"/>
<text x="592" y="224" font-size="13" font-weight="500" text-anchor="middle">memory</text>
<text x="592" y="246" font-size="11" text-anchor="middle" opacity="0.7">run state file</text>
<text x="592" y="264" font-size="11" text-anchor="middle" opacity="0.7">attempt · elapsed</text>
<text x="592" y="282" font-size="11" text-anchor="middle" opacity="0.7">last_error</text>
<text x="592" y="300" font-size="11" text-anchor="middle" opacity="0.7">gate verdicts</text>
<text x="592" y="324" font-size="11" text-anchor="middle" opacity="0.7">the loop's spine —</text>
<text x="592" y="340" font-size="11" text-anchor="middle" opacity="0.7">inspectable &amp;</text>
<text x="592" y="356" font-size="11" text-anchor="middle" opacity="0.7">resumable</text></g>
<line x1="494" y1="330" x2="514" y2="330" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="504" y="322" font-size="11" fill="#6B7280" text-anchor="middle">writes/iter</text>

<path d="M 300 492 L 252 514" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="238" y="508" font-size="11" fill="#6B7280">all pass</text>
<path d="M 380 492 L 428 514" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="430" y="508" font-size="11" fill="#6B7280">cap hit</text>

<g class="c-green"><rect x="120" y="518" width="216" height="50" rx="8"/>
<text x="228" y="540" font-size="13" font-weight="500" text-anchor="middle">Converge</text>
<text x="228" y="556" font-size="11" text-anchor="middle" opacity="0.7">commit + PR artifact -> human merge</text></g>

<g class="c-gray"><rect x="356" y="518" width="216" height="50" rx="8"/>
<text x="464" y="540" font-size="13" font-weight="500" text-anchor="middle">Escalate</text>
<text x="464" y="556" font-size="11" text-anchor="middle" opacity="0.7">write state · stop safely</text></g>
</svg>
